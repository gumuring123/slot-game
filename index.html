<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🎰 VIP NEON CASINO 🎰</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* [기존 스타일 유지] */
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap');
        @keyframes bg-glow {
            0% { background: radial-gradient(circle at center, #1a0033 0%, #000000 100%); }
            50% { background: radial-gradient(circle at center, #4d0099 0%, #0a001a 100%); }
            100% { background: radial-gradient(circle at center, #1a0033 0%, #000000 100%); }
        }
        body { font-family: 'Malgun Gothic', sans-serif; animation: bg-glow 5s infinite alternate; color: white; text-align: center; margin: 0; padding: 0; user-select: none; overflow-x: hidden; }
        #balance-ui { position: absolute; top: 20px; right: 30px; font-size: 20px; font-weight: bold; background: rgba(0,0,0,0.8); padding: 15px 25px; border-radius: 15px; border: 2px solid #ffd700; box-shadow: 0 0 20px #ffd700; z-index: 100; }
        #attendance-btn { position: absolute; top: 20px; left: 30px; padding: 12px 20px; background: linear-gradient(180deg, #ff00de, #9b0082); color: white; border: 2px solid #fff; border-radius: 10px; cursor: pointer; font-weight: bold; box-shadow: 0 0 15px #ff00de; z-index: 100; }
        h1 { margin-top: 80px; font-family: 'Black Han Sans', sans-serif; font-size: 60px; text-shadow: 0 0 20px #ff00de, 0 0 40px #ff00de; }
        .slot-container { display: inline-flex; justify-content: center; gap: 20px; margin: 30px 0; background: #111; padding: 30px 40px; border-radius: 25px; border: 4px solid #333; box-shadow: 0 0 50px #ff00de; }
        .slot { width: 130px; height: 140px; background: linear-gradient(180deg, #fff, #bbb); border-radius: 15px; font-size: 80px; display: flex; justify-content: center; align-items: center; color: black; box-shadow: inset 0 10px 20px rgba(0,0,0,0.5); }
        .controls { background: rgba(20, 30, 40, 0.8); padding: 25px; border-radius: 20px; border: 1px solid #444; max-width: 850px; display: inline-block; }
        .bet-buttons button { margin: 4px; padding: 10px 15px; background: #3498db; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; min-width: 65px; }
        .btn-spin { background: linear-gradient(180deg, #ff4757, #ff1e34); font-size: 28px; width: 100%; margin-top: 15px; padding: 15px; border-radius: 12px; cursor: pointer; box-shadow: 0 0 20px #ff4757; }
        #log-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; }
        #log-window { background: #111; border: 2px solid #00ffff; width: 550px; max-height: 600px; border-radius: 15px; display: flex; flex-direction: column; }
        #log-content { flex: 1; overflow-y: auto; padding: 20px; text-align: left; font-family: monospace; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: #111; padding: 40px; border-radius: 20px; border: 2px solid #00ffff; text-align: center; width: 320px; }
        #console { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.95); padding: 15px; border-top: 2px solid #00ffff; z-index: 10000; }
        #console-input { background: transparent; border: none; color: #00ffff; font-size: 20px; outline: none; width: 80%; font-family: monospace; }

        /* ✨ 신규 추가: 어드민 전용 버튼 & 패널 스타일 */
        #alert-btn { position: absolute; top: 20px; left: 160px; padding: 12px 20px; background: #ff4757; color: white; border: 2px solid #fff; border-radius: 10px; cursor: pointer; font-weight: bold; box-shadow: 0 0 15px #ff4757; z-index: 100; display: none; }
        #hack-panel-btn { position: absolute; top: 20px; left: 290px; padding: 12px 20px; background: #2ecc71; color: white; border: 2px solid #fff; border-radius: 10px; cursor: pointer; font-weight: bold; box-shadow: 0 0 15px #2ecc71; z-index: 100; display: none; }
        .hack-input { width: 80%; padding: 10px; margin: 5px 0; background: #222; border: 1px solid #2ecc71; color: #2ecc71; outline: none; }
    </style>
</head>
<body>

    <div id="log-overlay">
        <div id="log-window">
            <div style="padding:15px; border-bottom:1px solid #333; color:#00ffff; font-weight:bold;">📜 활동 로그: <span id="log-user-title"></span></div>
            <div id="log-content">로그 조회 중...</div>
            <button onclick="document.getElementById('log-overlay').style.display='none'" style="background:#444; padding:15px; border:none; color:white; cursor:pointer;">닫기</button>
        </div>
    </div>

    <div id="alert-overlay" class="modal-overlay">
        <div id="log-window">
            <div style="padding:15px; border-bottom:1px solid #333; color:#ff4757; font-weight:bold;">🚨 의심스러운 활동 (10만 이상 무단증가)</div>
            <div id="alert-content" style="flex:1; overflow-y:auto; padding:20px; text-align:left; font-family:monospace;">조회 중...</div>
            <button onclick="document.getElementById('alert-overlay').style.display='none'" style="background:#444; padding:15px; border:none; color:white; cursor:pointer;">닫기</button>
        </div>
    </div>

    <div id="hack-overlay" class="modal-overlay">
        <div class="modal" style="width:350px; border-color:#2ecc71;">
            <h2 style="color:#2ecc71;">⚡ ADMIN HACK TOOL</h2>
            <input type="text" id="hack-target" class="hack-input" placeholder="대상 유저 ID">
            <input type="text" id="hack-amount" class="hack-input" placeholder="금액 (예: 100k, 50m)">
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="window.game.execHack('SET')" style="flex:1; padding:10px; background:#2ecc71; color:white; border:none; border-radius:5px; cursor:pointer;">금액 고정</button>
                <button onclick="window.game.execHack('ADD')" style="flex:1; padding:10px; background:#3498db; color:white; border:none; border-radius:5px; cursor:pointer;">금액 추가</button>
            </div>
            <button onclick="document.getElementById('hack-overlay').style.display='none'" style="margin-top:15px; background:none; border:none; color:#888; cursor:pointer;">닫기</button>
        </div>
    </div>

    <div id="auth-overlay" class="modal-overlay" style="display:flex;">
        <div id="step-login" class="modal">
            <h2 style="color:#00ffff;">🎰 CASINO LOGIN</h2>
            <input type="text" id="login-id" placeholder="아이디" style="padding:10px; margin-bottom:10px; width:90%;"><br>
            <input type="password" id="login-pw" placeholder="비밀번호" style="padding:10px; margin-bottom:10px; width:90%;"><br>
            <button onclick="window.game.loginIdPw()" style="width:100%; padding:15px; background:#2ecc71; color:white; font-weight:bold; border:none; border-radius:8px;">로그인</button>
            <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
            <button onclick="window.game.registerGoogle()" style="width:100%; background:#4285F4; color:white; padding:10px; border:none; border-radius:8px;">구글 회원가입</button>
        </div>
        <div id="step-register" class="modal" style="display:none;">
            <h2 style="color:#ff00de;">📝 ID 설정</h2>
            <input type="text" id="reg-id" placeholder="아이디" style="padding:10px; margin-bottom:10px; width:90%;"><br>
            <input type="password" id="reg-pw" placeholder="비밀번호" style="padding:10px; margin-bottom:10px; width:90%;"><br>
            <button onclick="window.game.completeReg()" style="width:100%; background:#ff00de; color:white; padding:15px; border:none; border-radius:8px;">발급 완료</button>
        </div>
    </div>

    <div id="game-ui" style="display:none;">
        <button id="attendance-btn" onclick="window.game.openAttendance()">📅 출석체크</button>
        <button id="alert-btn" onclick="window.game.openAlerts()">📩 메시지함</button>
        <button id="hack-panel-btn" onclick="document.getElementById('hack-overlay').style.display='flex'">⚡ 핵패널</button>

        <div id="balance-ui">
            <div style="margin-bottom:5px;">👤 <span id="display-id">Guest</span> <span onclick="location.reload()" style="cursor:pointer; margin-left:10px;">🚪</span></div>
            <div style="font-size: 26px; color: #ffd700;">💰 <span id="balance">0</span></div>
        </div>

        <h1>✨ MEGA JACKPOT ✨</h1>
        <div class="slot-container">
            <div class="slot" id="slot1">❓</div>
            <div class="slot" id="slot2">❓</div>
            <div class="slot" id="slot3">❓</div>
        </div>
        <div id="message" style="font-size:24px; color:#ffd700; height:60px; line-height:1.2;">대박을 노려보세요!</div>

        <div class="controls">
            <div style="margin-bottom:10px; font-size:20px;">🔥 베팅금: <span id="current-bet" style="color:#00ffff;">0</span></div>
            <div class="bet-buttons">
                <button onclick="window.game.addBet(1)">+1</button>
                <button onclick="window.game.addBet(100)">+100</button>
                <button onclick="window.game.addBet(1000)">+1k</button>
                <button onclick="window.game.addBet(10000)">+10k</button>
                <button onclick="window.game.addBet(100000)">+100k</button>
                <button onclick="window.game.addBet(1000000)">+1m</button>
                <button onclick="window.game.addBet(10000000)">+10m</button>
                <button onclick="window.game.resetBet()" style="background:#555;">리셋</button>
            </div>
            <button class="btn-spin" onclick="window.game.spin()">🎰 SPIN!</button>
        </div>
    </div>

    <div id="console">
        <span style="color:#00ffff; font-family:monospace; font-size:20px;">ADMIN@ROOT:~$</span>
        <input type="text" id="console-input" placeholder="명령어 입력..." autocomplete="off">
    </div>

    <script>
    (function() {
        const firebaseConfig = {
		apiKey: "AIzaSyBF9sb_UYjPt6J_O7g6p4FkLSbggUC6cfM",
		authDomain: "gumurings-slot-game.firebaseapp.com",
		projectId: "gumurings-slot-game",
		storageBucket: "gumurings-slot-game.firebasestorage.app",
		messagingSenderId: "1006027725856",
		appId: "1:1006027725856:web:b7e5d7b55eac14dc377045"
		};
        const ADMIN_ID = "gumuring";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let balance = 0, currentBet = 0, myUID = "", userData = null;
        let isAdminAction = false; // ✨ 어드민 정당 조작 여부 확인용 플래그
        const multipliers = { '💎': 10, '💰': 5, '🍀': 3, '💣': 0 };

        function parseAmount(str) {
            str = String(str).toLowerCase();
            let mult = 1;
            if (str.endsWith('k')) { mult = 1000; str = str.slice(0, -1); }
            else if (str.endsWith('m')) { mult = 1000000; str = str.slice(0, -1); }
            return (parseFloat(str) || 0) * mult;
        }

        async function logAction(targetId, type, message, amount = 0) {
            await db.collection("logs").add({
                targetId, type, message, amount,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        window.game = {
            isLocalAction: false,
            
            loginIdPw: async function() {
                const id = document.getElementById('login-id').value;
                const pw = document.getElementById('login-pw').value;
                const snap = await db.collection("users").where("gameId", "==", id).where("gamePw", "==", pw).get();
                if(snap.empty) return alert("계정 정보가 일치하지 않습니다.");
                myUID = snap.docs[0].id;
                window.myGameId = id;
                this.start(id);
            },

            // [기존 구글 가입/등록 생략 - 로직 동일]
            registerGoogle: async function() { /* ... */ },
            completeReg: async function() { /* ... */ },

            start: function(id) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
                let isFirstLoad = true;

                db.collection("users").doc(myUID).onSnapshot(doc => {
                    if(!doc.exists) return;
                    let data = doc.data();
                    if(data.banned) { alert("🚨 접근이 차단된 계정입니다."); location.reload(); }
                    
                    // ✨ 신규: 보안 감시 (슬롯 안 돌렸고, 어드민도 아닌데 10만 이상 늘었을 때)
                    if(!isFirstLoad && data.balance - balance >= 100000 && !this.isLocalAction && !isAdminAction) {
                        logAction(id, "SUSPICIOUS", `[보안감시] 비정상적인 자금 급증 감지: +${(data.balance - balance).toLocaleString()}`, data.balance - balance);
                    }
                    
                    if(!isFirstLoad && data.balance > balance && !this.isLocalAction) {
                        this.showMessage(`🎁 입금이 확인되었습니다! (+${(data.balance-balance).toLocaleString()})`, "#00ffff");
                    }
                    
                    balance = data.balance;
                    userData = data;
                    isFirstLoad = false;
                    
                    const isAdmin = (id === ADMIN_ID || data.isAdmin);
                    document.getElementById('display-id').innerText = (isAdmin ? "👑 " : "") + id;
                    document.getElementById('display-id').style.color = isAdmin ? "#ffd700" : "#00ffff";
                    
                    // ✨ 신규: 어드민 전용 버튼 활성화
                    if(isAdmin) {
                        document.getElementById('alert-btn').style.display = 'block';
                        document.getElementById('hack-panel-btn').style.display = 'block';
                    }

                    this.updateUI();
                });
            },

            updateUI: function() {
                document.getElementById('balance').innerText = Math.floor(balance).toLocaleString();
                document.getElementById('current-bet').innerText = currentBet.toLocaleString();
            },

            addBet: (n) => { currentBet += n; window.game.updateUI(); },
            resetBet: () => { currentBet = 0; window.game.updateUI(); },

            spin: async function() {
                if(balance < currentBet || currentBet <= 0) return this.showMessage("금액이 부족하거나 베팅을 하지 않았습니다.", "#ff4757");
                this.isLocalAction = true;
                
                spin: async function() {
        if(balance < currentBet || currentBet <= 0) return this.showMessage("금액이 부족하거나 베팅을 하지 않았습니다.", "#ff4757");
        this.isLocalAction = true;
        
        // ✨ 새로 드린 확률 조작 로직 시작
        const getSymbolByProbability = () => {
            const rand = Math.random() * 100; 
            if (rand < 3) return '💎';        // 3%
            if (rand < 20) return '💰';       // 17%
            if (rand < 55) return '🍀';       // 35%
            return '💣';                      // 45%
        };

        const res = [getSymbolByProbability(), getSymbolByProbability(), getSymbolByProbability()];
                document.getElementById('slot1').innerText = res[0];
                document.getElementById('slot2').innerText = res[1];
                document.getElementById('slot3').innerText = res[2];

                let counts = {}; res.forEach(s => counts[s] = (counts[s] || 0) + 1);
                let winSymbol = null, matchCount = 0;
                for(let s in counts) { if(counts[s] >= 2 && s !== '💣') { winSymbol = s; matchCount = counts[s]; break; } }

                let prize = 0;
                let msg = "꽝! 다음 기회에...";
                let color = "#888";

                if(winSymbol) {
                    let baseMult = multipliers[winSymbol];
                    let finalMult = (matchCount === 3) ? baseMult * 2 : baseMult;
                    prize = currentBet * finalMult;
                    color = (matchCount === 3) ? "#00ffff" : "#ffd700";
                    msg = (matchCount === 3) 
                        ? `🔥 대박! [${winSymbol}] 3개 일치!<br>${finalMult}배 적용! (+${prize.toLocaleString()} 코인)`
                        : `🎉 [${winSymbol}] 2개 일치! ${finalMult}배 적용!<br>(+${prize.toLocaleString()} 코인)`;
                }

                this.showMessage(msg, color);
                await db.collection("users").doc(myUID).update({ balance: firebase.firestore.FieldValue.increment(prize - currentBet) });
                logAction(window.myGameId, "SPIN", `결과: ${res.join('|')} / 배수: ${prize/currentBet || 0} / 획득: ${prize}`, prize - currentBet);
                
                setTimeout(() => this.isLocalAction = false, 1000);
            },

            showMessage: (t, c) => { const m = document.getElementById('message'); m.innerHTML = t; m.style.color = c; },

            // ✨ 신규: 의심 로그 메시지함 조회
            openAlerts: async function() {
                document.getElementById('alert-overlay').style.display = 'flex';
                const content = document.getElementById('alert-content');
                content.innerHTML = "보안 데이터 로딩 중...";
                const logs = await db.collection("logs").where("type", "==", "SUSPICIOUS").orderBy("timestamp", "desc").limit(50).get();
                content.innerHTML = logs.empty ? "수상한 기록이 없습니다." : "";
                logs.forEach(doc => {
                    const d = doc.data();
                    const time = d.timestamp ? d.timestamp.toDate().toLocaleString() : "방금 전";
                    content.innerHTML += `<div style="border-bottom:1px solid #333; padding:10px; color:#ff4757;">[${time}] <b>${d.targetId}</b>: ${d.message}</div>`;
                });
            },

            // ✨ 신규: 핵 패널 실행 로직
            execHack: async function(mode) {
                const targetId = document.getElementById('hack-target').value;
                const amtStr = document.getElementById('hack-amount').value;
                const amount = parseAmount(amtStr);
                const snap = await db.collection("users").where("gameId", "==", targetId).get();
                if(snap.empty) return alert("해당 유저를 찾을 수 없습니다.");
                
                isAdminAction = true; // 보안 감시에 걸리지 않게 플래그 켬
                if(mode === 'SET') {
                    await snap.docs[0].ref.update({ balance: amount });
                    logAction(targetId, "ADMIN_SET", `어드민 핵 패널로 잔액 ${amount.toLocaleString()} 고정`, amount);
                } else {
                    await snap.docs[0].ref.update({ balance: firebase.firestore.FieldValue.increment(amount) });
                    logAction(targetId, "ADMIN_GIVE", `어드민 핵 패널로 ${amount.toLocaleString()} 추가`, amount);
                }
                alert("정상적으로 처리되었습니다.");
                isAdminAction = false;
                document.getElementById('hack-overlay').style.display = 'none';
            },

            openAttendance: function() { /* ...기존과 동일... */ }
        };

        // 🛡️ 콘솔 명령어 처리 업데이트
        document.addEventListener('keydown', (e) => {
            const isAdmin = (window.myGameId === ADMIN_ID || (userData && userData.isAdmin));
            if (e.key === '`' && isAdmin) {
                const c = document.getElementById('console');
                c.style.display = c.style.display === 'block' ? 'none' : 'block';
                if(c.style.display === 'block') document.getElementById('console-input').focus();
            }
        });

        document.getElementById('console-input').addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const cmd = e.target.value.trim().split(' ');
                e.target.value = '';
                document.getElementById('console').style.display = 'none';

                const targetId = cmd[1];
                const snap = await db.collection("users").where("gameId", "==", targetId).get();
                if(snap.empty && cmd[0] !== '/log') return alert("유저를 찾을 수 없습니다.");
                const targetRef = !snap.empty ? snap.docs[0].ref : null;

                // ✨ 신규 명령어: /deadmin [유저]
                if (cmd[0] === '/deadmin') {
                    await targetRef.update({ isAdmin: false });
                    alert(`${targetId}님의 관리자 권한이 해제되었습니다.`);
                    logAction(targetId, "ADMIN_REVOKE", "관리자 권한 해제됨");
                }
                // [기존 /give, /set, /take, /log 등 로직 유지...]
                else if (cmd[0] === '/give' && cmd[2] === 'coin') { /* ... */ }
                else if (cmd[0] === '/set' && cmd[2] === 'coin') { /* ... */ }
                else if (cmd[0] === '/log') { /* ... 위 기능 참고 ... */ }
            }
        });
    })();
    </script>
</body>
</html>
