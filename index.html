<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🎰 VIP NEON CASINO 🎰</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap');

        /* ✨ 배경 반짝임 & 눈부신 네온 효과 추가 */
        @keyframes bg-glow {
            0% { background: radial-gradient(circle at center, #2b0055 0%, #000000 100%); }
            50% { background: radial-gradient(circle at center, #5c0099 0%, #110022 100%); }
            100% { background: radial-gradient(circle at center, #2b0055 0%, #000000 100%); }
        }

        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            animation: bg-glow 4s infinite alternate; /* 배경 애니메이션 */
            color: white; text-align: center; margin: 0; padding: 0; user-select: none; overflow-x: hidden; 
        }
        
        /* 상단 UI 레이아웃 */
        #balance-ui { position: absolute; top: 20px; right: 30px; font-size: 20px; font-weight: bold; background: linear-gradient(145deg, #111, #222); padding: 15px 25px; border-radius: 15px; border: 2px solid #ffd700; box-shadow: 0 0 20px rgba(255, 215, 0, 0.8); z-index: 100; min-width: 180px; }
        #attendance-btn { position: absolute; top: 20px; left: 30px; padding: 12px 20px; background: linear-gradient(180deg, #ff00de, #9b0082); color: white; border: 2px solid #fff; border-radius: 10px; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px #ff00de; z-index: 100; transition: 0.3s; }
        #attendance-btn:hover { transform: scale(1.1); box-shadow: 0 0 30px #ff00de; }

        .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; color: #ecf0f1; border-bottom: 1px solid #555; padding-bottom: 8px; }
        .money-info { font-size: 26px; color: #ffd700; text-shadow: 0 0 15px #ffd700; }

        /* 슬롯 & 메시지 */
        h1 { margin-top: 80px; font-family: 'Black Han Sans', sans-serif; font-size: 60px; color: #fff; text-shadow: 0 0 25px #ff00de, 0 0 10px #ff00de; animation: neon-pulse 1.5s infinite alternate; }
        @keyframes neon-pulse {
            from { text-shadow: 0 0 10px #fff, 0 0 20px #ff00de, 0 0 30px #ff00de; }
            to { text-shadow: 0 0 5px #fff, 0 0 10px #ff00de, 0 0 15px #ff00de; }
        }

        .slot-container { display: inline-flex; justify-content: center; gap: 20px; margin: 30px 0; background: #111; padding: 30px 40px; border-radius: 25px; border: 4px solid #333; box-shadow: 0 0 40px #ff00de; position: relative; }
        .slot { width: 130px; height: 140px; background: linear-gradient(180deg, #ddd, #fff, #aaa); border-radius: 15px; font-size: 80px; display: flex; justify-content: center; align-items: center; color: black; box-shadow: inset 0 10px 20px rgba(0,0,0,0.4); }
        #message { height: 40px; font-size: 28px; font-weight: bold; color: #ffd700; margin-bottom: 20px; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }

        /* 컨트롤 패널 */
        .controls { background: rgba(26, 37, 47, 0.8); padding: 25px; border-radius: 20px; display: inline-block; border: 1px solid #444; box-shadow: 0 0 20px rgba(0,255,255,0.2); max-width: 800px; }
        .bet-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 15px 0; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; color: white; transition: 0.2s; background: #3498db; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        button:active { transform: translateY(3px); box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .btn-spin { background: linear-gradient(180deg, #ff4757, #ff1e34); font-size: 28px; padding: 15px; width: 100%; margin-top: 10px; border-radius: 12px; box-shadow: 0 0 20px #ff4757; }
        .btn-spin:hover { box-shadow: 0 0 30px #ff4757; }

        /* 채굴 구역 */
        .grind-area { background: rgba(9, 40, 20, 0.8); padding: 20px; border-radius: 15px; display: inline-block; border: 2px solid #2ecc71; margin-top: 20px; box-shadow: 0 0 15px #2ecc71; }
        .btn-grind { background: #f1c40f; color: black; font-size: 18px; padding: 10px 20px; }

        /* 모달 & 콘솔 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: #111; padding: 40px; border-radius: 20px; border: 2px solid #00ffff; box-shadow: 0 0 30px #00ffff; text-align: center; width: 320px; }
        .modal input { padding: 12px; margin: 10px 0; width: 90%; background: #222; color: #00ffff; border: 1px solid #444; text-align: center; font-size: 16px; }
        #console { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.95); padding: 15px; border-top: 2px solid #00ffff; box-shadow: 0 -10px 30px rgba(0,255,255,0.2); z-index: 10000; text-align: left; }
        #console-input { background: transparent; border: none; color: #00ffff; font-size: 20px; outline: none; width: 80%; font-family: monospace; }
    </style>
</head>
<body>

    <div id="attendance-overlay" class="modal-overlay">
        <div class="modal" style="border-color: #ff00de; box-shadow: 0 0 30px #ff00de;">
            <h2 style="color: #ff00de;">📅 DAILY CHECK-IN</h2>
            <p id="att-status">정보를 불러오는 중...</p>
            <p id="att-streak" style="font-size: 18px; color: #00ffff; font-weight: bold;"></p>
            <button id="do-att-btn" onclick="window.game.doAttendance()" style="background: #2ecc71; width: 100%; padding: 15px; display:none; font-size: 18px;">보상 받기</button>
            <button onclick="document.getElementById('attendance-overlay').style.display='none'" style="margin-top:10px; background:#555; width: 100%;">닫기</button>
        </div>
    </div>

    <div id="auth-overlay" class="modal-overlay" style="display:flex;">
        <div id="step-login" class="modal">
            <h1 style="margin:0 0 20px 0; font-size: 30px; color:#00ffff; animation: none; text-shadow: none;">🎰 CASINO LOGIN</h1>
            <input type="text" id="login-id" placeholder="아이디"><br>
            <input type="password" id="login-pw" placeholder="비밀번호"><br>
            <button onclick="window.game.loginIdPw()" style="width:100%; padding:15px; background:#2ecc71; margin-top:10px; font-size: 16px;">로그인</button>
            <hr style="border:0; border-top:1px solid #444; margin: 20px 0;">
            <button onclick="window.game.registerGoogle()" style="width:100%; background:#4285F4; padding:15px; font-size: 16px;">구글로 아이디 생성</button>
        </div>
        <div id="step-register" class="modal" style="display:none;">
            <h2 style="color:#ff00de;">📝 ID 설정</h2>
            <input type="text" id="reg-id" placeholder="사용할 아이디"><br>
            <input type="password" id="reg-pw" placeholder="비밀번호"><br>
            <button onclick="window.game.completeReg()" style="width:100%; background:#ff00de; padding:15px; font-size: 16px;">발급 완료</button>
        </div>
    </div>

    <div id="game-ui" style="display:none;">
        <button id="attendance-btn" onclick="window.game.openAttendance()">📅 출석체크</button>
        
        <div id="balance-ui">
            <div class="user-info">
                <span>👤 <span id="display-id" style="color: #00ffff;">Guest</span></span>
                <span style="cursor:pointer;" onclick="location.reload()">🚪 로그아웃</span>
            </div>
            <div class="money-info">💰 <span id="balance">0</span></div>
        </div>

        <h1>✨ MEGA JACKPOT ✨</h1>
        <div class="slot-container">
            <div class="slot" id="slot1">❓</div>
            <div class="slot" id="slot2">❓</div>
            <div class="slot" id="slot3">❓</div>
        </div>
        <div id="message">행운을 빌어보세요!</div>

        <div class="controls">
            <div style="color:#00ffff; font-size: 20px; font-weight: bold; margin-bottom: 10px;">🔥 현재 베팅금: <span id="current-bet">0</span></div>
            
            <div class="bet-buttons">
                <button onclick="window.game.addBet(1)">+1</button>
                <button onclick="window.game.addBet(10)">+10</button>
                <button onclick="window.game.addBet(100)">+100</button>
                <button onclick="window.game.addBet(1000)" style="background:#9b59b6;">+1K</button>
                <button onclick="window.game.addBet(10000)" style="background:#8e44ad;">+10K</button>
                <button onclick="window.game.addBet(100000)" style="background:#2980b9;">+100K</button>
                <button onclick="window.game.addBet(1000000)" style="background:#e67e22;">+1M</button>
                <button onclick="window.game.addBet(10000000)" style="background:#d35400;">+10M</button>
                <button onclick="window.game.resetBet()" style="background:#7f8c8d; border: 2px solid #fff;">리셋</button>
            </div>
            <button class="btn-spin" onclick="window.game.spin()">🎰 SPIN!</button>
        </div>

        <br>
        <div class="grind-area">
            <div style="font-weight: bold;">[ 무료 코인 채굴 ] 진행도: <span id="grind-count" style="color: #f1c40f;">0</span> / 10</div>
            <button class="btn-grind" onclick="window.game.grind()" style="margin-top: 10px;">⛏️ 코인 캐기</button>
        </div>
    </div>

    <div id="console">
        <span style="color:#00ffff; font-family:monospace; font-size: 20px;">ADMIN@ROOT:~$</span>
        <input type="text" id="console-input" placeholder="명령어 입력... (예: /give user coin 10m 또는 /give user admin)" autocomplete="off">
    </div>

    <script>
    (function() {
       const firebaseConfig = {
		apiKey: "AIzaSyBF9sb_UYjPt6J_O7g6p4FkLSbggUC6cfM",
		authDomain: "gumurings-slot-game.firebaseapp.com",
		projectId: "gumurings-slot-game",
		storageBucket: "gumurings-slot-game.firebasestorage.app",
		messagingSenderId: "1006027725856",
		appId: "1:1006027725856:web:b7e5d7b55eac14dc377045"
		};
        const ADMIN_ID = "gumuring"; // 최고 관리자 하드코딩

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let balance = 0;
        let currentBet = 0;
        let grindCount = 0;
        let myUID = "";
        let userData = null;

        const multipliers = { '💎': 10, '💰': 5, '🍀': 3, '💣': 0 };
        const probabilities = { '💎': 5, '💰': 15, '🍀': 30, '💣': 50 };
        const symbols = Object.keys(probabilities);

        function getGameDate() {
            const now = new Date();
            if (now.getHours() < 7) now.setDate(now.getDate() - 1);
            return now.toISOString().split('T')[0];
        }

        // ✨ k, m 단위 계산 함수 추가
        function parseAmount(str) {
            str = str.toLowerCase();
            let multiplier = 1;
            if (str.endsWith('k')) { multiplier = 1000; str = str.slice(0, -1); }
            else if (str.endsWith('m')) { multiplier = 1000000; str = str.slice(0, -1); }
            let val = parseFloat(str);
            return isNaN(val) ? 0 : val * multiplier;
        }

        window.game = {
            isLocalAction: false,
            unsubscribe: null,

            loginIdPw: async function() {
                const id = document.getElementById('login-id').value;
                const pw = document.getElementById('login-pw').value;
                const snapshot = await db.collection("users").where("gameId", "==", id).where("gamePw", "==", pw).get();
                if(snapshot.empty) return alert("아이디나 비밀번호가 틀렸습니다.");
                myUID = snapshot.docs[0].id;
                window.myGameId = id;
                this.start(id);
            },

            registerGoogle: async function() {
                const provider = new firebase.auth.GoogleAuthProvider();
                const res = await auth.signInWithPopup(provider);
                myUID = res.user.uid;
                const doc = await db.collection("users").doc(myUID).get();
                if (doc.exists) {
                    alert("이미 가입된 계정입니다. 아이디로 로그인하세요.");
                    auth.signOut();
                } else {
                    document.getElementById('step-login').style.display = 'none';
                    document.getElementById('step-register').style.display = 'block';
                }
            },

            completeReg: async function() {
                const id = document.getElementById('reg-id').value;
                const pw = document.getElementById('reg-pw').value;
                // ✨ DB 생성 시 isAdmin 필드 기본값은 false로 세팅
                await db.collection("users").doc(myUID).set({ gameId: id, gamePw: pw, balance: 1000, banned: false, isAdmin: false });
                window.myGameId = id;
                this.start(id);
            },

            start: function(id) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
                
                let isFirstLoad = true;

                if(this.unsubscribe) this.unsubscribe();
                this.unsubscribe = db.collection("users").doc(myUID).onSnapshot((doc) => {
                    if (!doc.exists) return;
                    let data = doc.data();

                    if (data.banned) { alert("🚨 관리자에 의해 차단된 계정입니다."); location.reload(); }
                    
                    if (!isFirstLoad && data.balance > balance && !this.isLocalAction) {
                        this.showMessage(`🎁 누군가 ${(data.balance - balance).toLocaleString()}코인을 쐈습니다!`, "#00ffff");
                    }

                    balance = data.balance;
                    userData = data;
                    isFirstLoad = false;
                    
                    // 어드민 뱃지 표시
                    const isAdmin = (window.myGameId === ADMIN_ID || data.isAdmin === true);
                    document.getElementById('display-id').innerHTML = isAdmin ? `👑 ${id}` : id;
                    document.getElementById('display-id').style.color = isAdmin ? "#ffd700" : "#00ffff";

                    this.updateUI();
                });
            },

            updateUI: function() {
                document.getElementById('balance').innerText = Math.floor(balance).toLocaleString();
                document.getElementById('current-bet').innerText = currentBet.toLocaleString();
                document.getElementById('grind-count').innerText = grindCount;
            },

            openAttendance: function() {
                document.getElementById('attendance-overlay').style.display = 'flex';
                const today = getGameDate();
                const last = userData.lastAttendance || "";
                const streak = userData.streak || 0;
                document.getElementById('att-streak').innerText = `${streak}일 연속 출석 중! 🔥`;
                if (last === today) {
                    document.getElementById('att-status').innerText = "오늘 출석을 이미 완료했습니다!";
                    document.getElementById('do-att-btn').style.display = 'none';
                } else {
                    document.getElementById('att-status').innerText = "오늘의 보상을 받아가세요!";
                    document.getElementById('do-att-btn').style.display = 'block';
                }
            },

            doAttendance: async function() {
                const today = getGameDate();
                const last = userData.lastAttendance || "";
                let streak = userData.streak || 0;

                const yesterday = new Date();
                yesterday.setHours(yesterday.getHours() < 7 ? yesterday.getHours() - 24 : yesterday.getHours());
                yesterday.setDate(yesterday.getDate() - 1);
                const yesterdayStr = yesterday.toISOString().split('T')[0];

                streak = (last === yesterdayStr) ? streak + 1 : 1;
                const reward = Math.floor(1000 * (streak / 10 + 0.9));

                this.isLocalAction = true;
                await db.collection("users").doc(myUID).update({
                    balance: firebase.firestore.FieldValue.increment(reward),
                    lastAttendance: today, streak: streak
                });
                document.getElementById('attendance-overlay').style.display = 'none';
                this.showMessage(`🎁 출석 완료! ${reward.toLocaleString()}코인 획득!`, "#2ecc71");
                setTimeout(() => this.isLocalAction = false, 1000);
            },

            grind: async function() {
                grindCount++;
                if (grindCount >= 10) {
                    grindCount = 0;
                    this.isLocalAction = true;
                    await db.collection("users").doc(myUID).update({ balance: firebase.firestore.FieldValue.increment(1) });
                    this.showMessage("✨ 1원 채굴 성공!", "#2ecc71");
                    setTimeout(() => this.isLocalAction = false, 1000);
                }
                this.updateUI();
            },

            addBet: function(n) { currentBet += n; this.updateUI(); },
            resetBet: function() { currentBet = 0; this.updateUI(); },

            spin: async function() {
                if(balance < currentBet || currentBet <= 0) return this.showMessage("베팅 금액이 부족하거나 0입니다!", "#ff4757");

                balance -= currentBet; this.updateUI();
                
                const res = [this.getRandomSymbol(), this.getRandomSymbol(), this.getRandomSymbol()];
                document.getElementById('slot1').innerText = res[0];
                document.getElementById('slot2').innerText = res[1];
                document.getElementById('slot3').innerText = res[2];

                let counts = {}; res.forEach(s => counts[s] = (counts[s] || 0) + 1);
                let winS = null; let mCount = 0;
                for(let s in counts) { if(counts[s] >= 2) { winS = s; mCount = counts[s]; break; } }

                let prize = 0;
                if(winS) {
                    prize = currentBet * multipliers[winS];
                    if(mCount === 3) {
                        prize *= 2;
                        this.showMessage(`🔥 3개 일치! 2배 잭팟! ${prize.toLocaleString()}원!`, "#00ffff");
                    } else {
                        this.showMessage(`🎉 당첨! ${prize.toLocaleString()}원!`, "#ffd700");
                    }
                } else { this.showMessage("꽝! 다음 기회에...", "#888"); }

                this.isLocalAction = true;
                await db.collection("users").doc(myUID).update({ balance: firebase.firestore.FieldValue.increment(prize - currentBet) });
                setTimeout(() => this.isLocalAction = false, 1000);
            },

            getRandomSymbol: function() {
                let r = Math.random() * 100; let s = 0;
                for(let k in probabilities) { s += probabilities[k]; if(r < s) return k; }
            }
        };

        window.game.showMessage = function(t, c) {
            const m = document.getElementById('message');
            m.innerText = t; m.style.color = c;
        };

        // ✨ 콘솔 기능 및 관리자 권한 확인 로직 업데이트
        document.addEventListener('keydown', (e) => {
            // 본인이 최고관리자(admin)이거나, DB상에서 isAdmin이 true인 경우 콘솔 허용
            const isUserAdmin = window.myGameId === ADMIN_ID || (userData && userData.isAdmin === true);
            
            if (e.key === '`' && isUserAdmin) {
                const c = document.getElementById('console');
                c.style.display = c.style.display === 'block' ? 'none' : 'block';
                if(c.style.display === 'block') document.getElementById('console-input').focus();
            }
        });

        document.getElementById('console-input').addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const val = e.target.value.trim().split(' '); 
                e.target.value = '';
                document.getElementById('console').style.display = 'none';

                if (val[0] === '/give' && val.length >= 3) {
                    const targetId = val[1];
                    const item = val[2]; // 'coin' 또는 'admin'
                    
                    const snap = await db.collection("users").where("gameId", "==", targetId).get();
                    if(snap.empty) {
                        alert(`[오류] '${targetId}' 유저를 찾을 수 없습니다.`);
                        return;
                    }
                    
                    const targetRef = snap.docs[0].ref;

                    if (item === 'coin' && val.length === 4) {
                        // k, m 단위 파싱 로직 적용
                        const amount = parseAmount(val[3]);
                        targetRef.update({ balance: firebase.firestore.FieldValue.increment(amount) });
                        alert(`${targetId} 님에게 ${amount.toLocaleString()} 코인을 지급했습니다.`);
                    } 
                    else if (item === 'admin') {
                        // 관리자 권한 부여
                        targetRef.update({ isAdmin: true });
                        alert(`${targetId} 님을 관리자로 임명했습니다!`);
                    }
                }
            }
        });
    })();
    </script>
</body>
</html>
