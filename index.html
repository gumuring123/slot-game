<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🎰 VIP NEON CASINO 🎰</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap');

        /* ✨ 더 눈부시고 화려해진 배경 애니메이션 */
        @keyframes bg-glow {
            0% { background: radial-gradient(circle at center, #1a0033 0%, #000000 100%); }
            25% { background: radial-gradient(circle at center, #3d0066 0%, #050011 100%); }
            50% { background: radial-gradient(circle at center, #6600cc 0%, #000000 100%); }
            75% { background: radial-gradient(circle at center, #3d0066 0%, #050011 100%); }
            100% { background: radial-gradient(circle at center, #1a0033 0%, #000000 100%); }
        }

        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            animation: bg-glow 6s infinite ease-in-out; 
            color: white; text-align: center; margin: 0; padding: 0; user-select: none; overflow-x: hidden; 
        }
        
        /* UI 요소 */
        #balance-ui { position: absolute; top: 20px; right: 30px; font-size: 20px; font-weight: bold; background: rgba(17, 17, 17, 0.9); padding: 15px 25px; border-radius: 15px; border: 2px solid #ffd700; box-shadow: 0 0 25px rgba(255, 215, 0, 0.6); z-index: 100; }
        #attendance-btn { position: absolute; top: 20px; left: 30px; padding: 12px 20px; background: linear-gradient(180deg, #ff00de, #9b0082); color: white; border: 2px solid #fff; border-radius: 10px; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px #ff00de; z-index: 100; transition: 0.3s; }

        h1 { margin-top: 80px; font-family: 'Black Han Sans', sans-serif; font-size: 60px; color: #fff; text-shadow: 0 0 20px #ff00de, 0 0 40px #ff00de; animation: neon-pulse 1.5s infinite alternate; }
        @keyframes neon-pulse { from { opacity: 1; } to { opacity: 0.8; } }

        .slot-container { display: inline-flex; justify-content: center; gap: 20px; margin: 30px 0; background: #111; padding: 30px 40px; border-radius: 25px; border: 4px solid #333; box-shadow: 0 0 50px #ff00de; }
        .slot { width: 130px; height: 140px; background: linear-gradient(180deg, #fff, #bbb); border-radius: 15px; font-size: 80px; display: flex; justify-content: center; align-items: center; color: black; box-shadow: inset 0 10px 20px rgba(0,0,0,0.5); }

        .controls { background: rgba(20, 30, 40, 0.85); padding: 25px; border-radius: 20px; border: 1px solid #444; max-width: 800px; display: inline-block; box-shadow: 0 0 30px rgba(0,255,255,0.2); }
        .bet-buttons button { margin: 4px; padding: 10px 15px; background: #3498db; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .btn-spin { background: linear-gradient(180deg, #ff4757, #ff1e34); font-size: 28px; width: 100%; margin-top: 15px; padding: 15px; border-radius: 12px; cursor: pointer; box-shadow: 0 0 20px #ff4757; }

        /* 📜 로그 모달 스타일 */
        #log-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 2000; }
        #log-window { background: #111; border: 2px solid #00ffff; width: 500px; max-height: 600px; border-radius: 15px; display: flex; flex-direction: column; }
        #log-header { padding: 15px; border-bottom: 1px solid #333; font-weight: bold; color: #00ffff; }
        #log-content { flex: 1; overflow-y: auto; padding: 15px; text-align: left; font-family: monospace; font-size: 14px; }
        .log-entry { margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px dashed #222; }

        /* 공통 모달 & 콘솔 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: #111; padding: 40px; border-radius: 20px; border: 2px solid #00ffff; text-align: center; width: 320px; }
        #console { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.95); padding: 15px; border-top: 2px solid #00ffff; z-index: 10000; text-align: left; }
        #console-input { background: transparent; border: none; color: #00ffff; font-size: 20px; outline: none; width: 80%; font-family: monospace; }
    </style>
</head>
<body>

    <div id="log-overlay">
        <div id="log-window">
            <div id="log-header">📜 활동 로그: <span id="log-user-title"></span></div>
            <div id="log-content">로그를 불러오는 중...</div>
            <button onclick="document.getElementById('log-overlay').style.display='none'" style="background:#444; padding:15px; border:none; color:white; cursor:pointer;">닫기</button>
        </div>
    </div>

    <div id="auth-overlay" class="modal-overlay" style="display:flex;">
        <div id="step-login" class="modal">
            <h2 style="color:#00ffff;">🎰 CASINO LOGIN</h2>
            <input type="text" id="login-id" placeholder="아이디" style="padding:10px; margin-bottom:10px; width:90%;"><br>
            <input type="password" id="login-pw" placeholder="비밀번호" style="padding:10px; margin-bottom:10px; width:90%;"><br>
            <button onclick="window.game.loginIdPw()" style="width:100%; padding:15px; background:#2ecc71;">로그인</button>
            <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
            <button onclick="window.game.registerGoogle()" style="width:100%; background:#4285F4; padding:10px;">구글 회원가입</button>
        </div>
        <div id="step-register" class="modal" style="display:none;">
            <h2>📝 ID 설정</h2>
            <input type="text" id="reg-id" placeholder="사용할 아이디" style="padding:10px; margin-bottom:10px; width:90%;"><br>
            <input type="password" id="reg-pw" placeholder="비밀번호" style="padding:10px; margin-bottom:10px; width:90%;"><br>
            <button onclick="window.game.completeReg()" style="width:100%; background:#ff00de; padding:15px;">발급 완료</button>
        </div>
    </div>

    <div id="game-ui" style="display:none;">
        <button id="attendance-btn" onclick="window.game.openAttendance()">📅 출석체크</button>
        <div id="balance-ui">
            <div class="user-info">👤 <span id="display-id">Guest</span> <span onclick="location.reload()" style="cursor:pointer;">🚪</span></div>
            <div style="font-size: 26px; color: #ffd700;">💰 <span id="balance">0</span></div>
        </div>

        <h1>✨ MEGA JACKPOT ✨</h1>
        <div class="slot-container">
            <div class="slot" id="slot1">❓</div>
            <div class="slot" id="slot2">❓</div>
            <div class="slot" id="slot3">❓</div>
        </div>
        <div id="message" style="font-size:24px; color:#ffd700; height:30px;">행운을 빌어요!</div>

        <div class="controls">
            <div style="margin-bottom:10px;">베팅금: <span id="current-bet" style="color:#00ffff;">0</span></div>
            <div class="bet-buttons">
                <button onclick="window.game.addBet(1)">+1</button>
                <button onclick="window.game.addBet(100)">+100</button>
                <button onclick="window.game.addBet(1000)">+1k</button>
                <button onclick="window.game.addBet(10000)">+10k</button>
                <button onclick="window.game.addBet(100000)">+100k</button>
                <button onclick="window.game.addBet(1000000)">+1m</button>
                <button onclick="window.game.addBet(10000000)">+10m</button>
                <button onclick="window.game.resetBet()" style="background:#555;">리셋</button>
            </div>
            <button class="btn-spin" onclick="window.game.spin()">🎰 SPIN!</button>
        </div>
    </div>

    <div id="console">
        <span style="color:#00ffff; font-family:monospace;">ADMIN@ROOT:~$</span>
        <input type="text" id="console-input" placeholder="명령어 입력..." autocomplete="off">
    </div>

    <script>
    (function() {
        const firebaseConfig = {
		apiKey: "AIzaSyBF9sb_UYjPt6J_O7g6p4FkLSbggUC6cfM",
		authDomain: "gumurings-slot-game.firebaseapp.com",
		projectId: "gumurings-slot-game",
		storageBucket: "gumurings-slot-game.firebasestorage.app",
		messagingSenderId: "1006027725856",
		appId: "1:1006027725856:web:b7e5d7b55eac14dc377045"
		};
        const ADMIN_ID = "gumuring";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let balance = 0, currentBet = 0, myUID = "", userData = null;

        // k, m 처리기
        function parseAmount(str) {
            str = str.toLowerCase();
            let mult = 1;
            if (str.endsWith('k')) { mult = 1000; str = str.slice(0, -1); }
            else if (str.endsWith('m')) { mult = 1000000; str = str.slice(0, -1); }
            return (parseFloat(str) || 0) * mult;
        }

        // ✨ 로그 기록 함수
        async function logAction(targetGameId, type, message, amount = 0) {
            await db.collection("logs").add({
                targetId: targetGameId,
                type: type,
                message: message,
                amount: amount,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        window.game = {
            isLocalAction: false,
            
            loginIdPw: async function() {
                const id = document.getElementById('login-id').value;
                const pw = document.getElementById('login-pw').value;
                const snap = await db.collection("users").where("gameId", "==", id).where("gamePw", "==", pw).get();
                if(snap.empty) return alert("틀렸습니다.");
                myUID = snap.docs[0].id;
                window.myGameId = id;
                this.start(id);
            },

            // 회원가입 등 생략 (이전 코드와 동일)

            start: function(id) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
                let isFirstLoad = true;

                db.collection("users").doc(myUID).onSnapshot(doc => {
                    if(!doc.exists) return;
                    let data = doc.data();
                    if(data.banned) { alert("🚨 차단되었습니다."); location.reload(); }
                    
                    if(!isFirstLoad && data.balance > balance && !this.isLocalAction) {
                        this.showMessage(`🎁 입금되었습니다! (+${(data.balance-balance).toLocaleString()})`, "#00ffff");
                    }
                    
                    balance = data.balance;
                    userData = data;
                    isFirstLoad = false;
                    
                    const isAdmin = (id === ADMIN_ID || data.isAdmin);
                    document.getElementById('display-id').innerText = (isAdmin ? "👑 " : "") + id;
                    document.getElementById('display-id').style.color = isAdmin ? "#ffd700" : "#00ffff";
                    this.updateUI();
                });
            },

            updateUI: function() {
                document.getElementById('balance').innerText = Math.floor(balance).toLocaleString();
                document.getElementById('current-bet').innerText = currentBet.toLocaleString();
            },

            addBet: (n) => { currentBet += n; window.game.updateUI(); },
            resetBet: () => { currentBet = 0; window.game.updateUI(); },

            spin: async function() {
                if(balance < currentBet || currentBet <= 0) return;
                this.isLocalAction = true;
                
                // 슬롯 로직 (간략화)
                const symbols = ['💎', '💰', '🍀', '💣'];
                const res = [symbols[Math.floor(Math.random()*4)], symbols[Math.floor(Math.random()*4)], symbols[Math.floor(Math.random()*4)]];
                document.getElementById('slot1').innerText = res[0];
                document.getElementById('slot2').innerText = res[1];
                document.getElementById('slot3').innerText = res[2];

                let prize = 0;
                if(res[0] === res[1] && res[1] === res[2]) prize = currentBet * 10;
                else if(res[0] === res[1] || res[1] === res[2]) prize = currentBet * 2;

                await db.collection("users").doc(myUID).update({ balance: firebase.firestore.FieldValue.increment(prize - currentBet) });
                
                // ✨ 스핀 결과 로그 남기기
                logAction(window.myGameId, "SPIN", `베팅: ${currentBet} / 결과: ${res.join('|')} / 획득: ${prize}`, prize - currentBet);
                
                setTimeout(() => this.isLocalAction = false, 1000);
            },

            showMessage: (t, c) => { const m = document.getElementById('message'); m.innerText = t; m.style.color = c; }
        };

        // 🛡️ 어드민 콘솔 기능 확대
        document.addEventListener('keydown', (e) => {
            const isAdmin = (window.myGameId === ADMIN_ID || (userData && userData.isAdmin));
            if (e.key === '`' && isAdmin) {
                const c = document.getElementById('console');
                c.style.display = c.style.display === 'block' ? 'none' : 'block';
                if(c.style.display === 'block') document.getElementById('console-input').focus();
            }
        });

        document.getElementById('console-input').addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const cmd = e.target.value.trim().split(' ');
                e.target.value = '';
                document.getElementById('console').style.display = 'none';

                const targetId = cmd[1];

                // 1. /give [유저] coin [금액]
                if (cmd[0] === '/give' && cmd[2] === 'coin') {
                    const amt = parseAmount(cmd[3]);
                    const snap = await db.collection("users").where("gameId", "==", targetId).get();
                    if(!snap.empty) {
                        await snap.docs[0].ref.update({ balance: firebase.firestore.FieldValue.increment(amt) });
                        logAction(targetId, "ADMIN_GIVE", `어드민이 ${amt} 코인을 지급함`, amt);
                        alert("지급 완료");
                    }
                }
                // 2. /give [유저] admin
                else if (cmd[0] === '/give' && cmd[2] === 'admin') {
                    const snap = await db.collection("users").where("gameId", "==", targetId).get();
                    if(!snap.empty) {
                        await snap.docs[0].ref.update({ isAdmin: true });
                        logAction(targetId, "ADMIN_PROMOTED", "어드민으로 승격됨");
                    }
                }
                // 3. /take [유저] coin [금액]
                else if (cmd[0] === '/take' && cmd[2] === 'coin') {
                    const amt = parseAmount(cmd[3]);
                    const snap = await db.collection("users").where("gameId", "==", targetId).get();
                    if(!snap.empty) {
                        await snap.docs[0].ref.update({ balance: firebase.firestore.FieldValue.increment(-amt) });
                        logAction(targetId, "ADMIN_TAKE", `어드민이 ${amt} 코인을 회수함`, -amt);
                        alert("회수 완료");
                    }
                }
                // 4. /ban [유저]
                else if (cmd[0] === '/ban') {
                    const snap = await db.collection("users").where("gameId", "==", targetId).get();
                    if(!snap.empty) {
                        await snap.docs[0].ref.update({ banned: true });
                        logAction(targetId, "ADMIN_BAN", "어드민이 차단함");
                        alert("차단 완료");
                    }
                }
                // 5. /log [유저]
                else if (cmd[0] === '/log') {
                    document.getElementById('log-overlay').style.display = 'flex';
                    document.getElementById('log-user-title').innerText = targetId;
                    const content = document.getElementById('log-content');
                    content.innerHTML = "조회 중...";

                    const logs = await db.collection("logs")
                                        .where("targetId", "==", targetId)
                                        .orderBy("timestamp", "desc")
                                        .limit(500).get();
                    
                    if(logs.empty) {
                        content.innerHTML = "기록이 없습니다.";
                    } else {
                        content.innerHTML = "";
                        logs.forEach(doc => {
                            const d = doc.data();
                            const time = d.timestamp ? d.timestamp.toDate().toLocaleString() : "방금 전";
                            content.innerHTML += `<div class="log-entry">[${time}] <b>${d.type}</b>: ${d.message}</div>`;
                        });
                    }
                }
            }
        });
    })();
    </script>
</body>
</html>
